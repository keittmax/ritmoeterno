<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ritmoeterno</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #fff;
      color: #111;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 2.5rem 1rem 1rem;
    }

    .logo {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.22em;
      font-weight: normal;
      text-decoration: none;
      color: #111;
      margin-bottom: 1rem;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
    }

    nav a {
      color: #111;
      text-decoration: none;
    }

    nav a:hover { color: #999; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 3rem 0 4rem;
    }

    .product {
      padding: 0 1.5rem;
      text-align: center;
    }

    .product-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .product-image img {
      max-width: 75%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      transition: opacity 0.3s ease;
    }

    .product:hover .product-image img { opacity: 0.75; }

    .product-name {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      font-weight: normal;
      margin-bottom: 0.2rem;
    }

    .product-status {
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      color: #999;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: #bbb;
      border-top: 1px solid #eee;
    }

    footer a { color: #bbb; text-decoration: none; }
    footer a:hover { color: #111; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .grid { grid-template-columns: repeat(2, 1fr); padding: 2rem 0; }
      .product { padding: 0 1rem; }
    }

    @media (max-width: 420px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="/">ritmoeterno</a>
    <nav>
      <a href="https://www.instagram.com/ritmoeterno/" target="_blank" rel="noopener">instagram</a>
    </nav>
  </header>

  <main>
    <div class="grid">

      <div class="product">
        <div class="product-image">
          <img src="images/hoodie-flat.png" alt="Hoodie" loading="lazy">
        </div>
        <p class="product-name">hoodie</p>
        <p class="product-status">sold out</p>
      </div>

      <div class="product">
        <div class="product-image">
          <img src="images/polera-2.png" alt="Polera 2" loading="lazy">
        </div>
        <p class="product-name">polera 2</p>
        <p class="product-status">sold out</p>
      </div>

      <div class="product">
        <div class="product-image">
          <img src="images/bandana-roja.png" alt="Bandana Roja" loading="lazy">
        </div>
        <p class="product-name">bandana roja</p>
        <p class="product-status">sold out</p>
      </div>

    </div>
  </main>

  <footer>
    <a href="https://www.instagram.com/ritmoeterno/" target="_blank" rel="noopener">instagram</a>
    &nbsp;·&nbsp; © 2026 ritmoeterno
  </footer>

</body>
</html>
