<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ritmoeterno</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0f0f0f;
      --white: #f5f5f0;
      --gray: #999;
      --line: #e0e0db;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 10;
    }

    .logo {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: normal;
      text-decoration: none;
      color: var(--black);
    }

    nav {
      display: flex;
      gap: 2rem;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: lowercase;
    }

    nav a {
      color: var(--black);
      text-decoration: none;
    }

    nav a:hover { color: var(--gray); }

    /* ── Grid ── */
    main {
      padding: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--line);
    }

    .product {
      background: var(--white);
    }

    .product-image {
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: #ebebeb;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.4s ease;
    }

    .product:hover .product-image img {
      opacity: 0.85;
    }

    .product-info {
      padding: 0.8rem 1rem 1.1rem;
    }

    .product-name {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: lowercase;
      font-weight: normal;
      margin-bottom: 0.25rem;
    }

    .product-status {
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      color: var(--gray);
    }

    /* ── Footer ── */
    footer {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: var(--gray);
      text-transform: lowercase;
      border-top: 1px solid var(--line);
      margin-top: 1px;
    }

    footer a {
      color: var(--gray);
      text-decoration: none;
    }

    footer a:hover { color: var(--black); }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      header { padding: 1.1rem 1.25rem; }
      nav { gap: 1.25rem; }
      footer { padding: 1.1rem 1.25rem; flex-direction: column; gap: 0.35rem; }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="/">ritmoeterno</a>
    <nav>
      <a href="https://www.instagram.com/ritmoeterno/" target="_blank" rel="noopener">instagram</a>
    </nav>
  </header>

  <main>
    <div class="grid">

      <div class="product">
        <div class="product-image">
          <img src="images/hoodie.jpg" alt="Hoodie" loading="lazy">
        </div>
        <div class="product-info">
          <p class="product-name">hoodie</p>
          <p class="product-status">sold out</p>
        </div>
      </div>

      <div class="product">
        <div class="product-image">
          <img src="images/tee-blanca.jpg" alt="Tee Blanca" loading="lazy">
        </div>
        <div class="product-info">
          <p class="product-name">tee blanca</p>
          <p class="product-status">sold out</p>
        </div>
      </div>

      <div class="product">
        <div class="product-image">
          <img src="images/polera-2.jpg" alt="Polera 2" loading="lazy">
        </div>
        <div class="product-info">
          <p class="product-name">polera 2</p>
          <p class="product-status">sold out</p>
        </div>
      </div>

      <div class="product">
        <div class="product-image">
          <img src="images/tee-goforever.jpg" alt="Tee GoForever" loading="lazy">
        </div>
        <div class="product-info">
          <p class="product-name">tee goforever</p>
          <p class="product-status">sold out</p>
        </div>
      </div>

      <div class="product">
        <div class="product-image">
          <img src="images/legacy-tee.jpg" alt="Legacy Tee" loading="lazy">
        </div>
        <div class="product-info">
          <p class="product-name">legacy tee</p>
          <p class="product-status">sold out</p>
        </div>
      </div>

      <div class="product">
        <div class="product-image">
          <img src="images/bandana-roja.jpg" alt="Bandana Roja" loading="lazy">
        </div>
        <div class="product-info">
          <p class="product-name">bandana roja</p>
          <p class="product-status">sold out</p>
        </div>
      </div>

      <div class="product">
        <div class="product-image">
          <img src="images/bandana-psycho.jpg" alt="Bandana Psycho" loading="lazy">
        </div>
        <div class="product-info">
          <p class="product-name">bandana psycho</p>
          <p class="product-status">sold out</p>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <span>ritmoeterno.com</span>
    <a href="https://www.instagram.com/ritmoeterno/" target="_blank" rel="noopener">instagram →</a>
    <span>© 2026</span>
  </footer>

</body>
</html>
