<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ritmoeterno</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #fff;
      color: #111;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
    }

    .logo {
      display: inline-block;
      text-decoration: none;
      margin-bottom: 1.25rem;
    }

    .logo img {
      height: 28px;
      width: auto;
      display: block;
    }

    .footer-symbol {
      display: block;
      margin: 0 auto 1rem;
      height: 18px;
      width: auto;
      opacity: 0.35;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
    }

    nav a {
      color: #111;
      text-decoration: none;
    }

    nav a:hover { color: #999; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 3rem 0 4rem;
    }

    .product {
      padding: 0 1.5rem;
      text-align: center;
      text-decoration: none;
      color: inherit;
    }

    .product-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .product-image img {
      max-width: 75%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      transition: opacity 0.3s ease;
    }

    .product:hover .product-image img { opacity: 0.75; }

    .product-name {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      font-weight: normal;
      margin-bottom: 0.2rem;
    }

    .product-status {
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      color: #999;
    }

    /* ── Newsletter ── */
    .newsletter {
      text-align: center;
      padding: 3rem 1rem 4rem;
      border-top: 1px solid #eee;
    }

    .newsletter-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: #999;
      margin-bottom: 1rem;
      font-style: italic;
    }

    .newsletter-row {
      display: flex;
      justify-content: center;
      gap: 0;
      max-width: 320px;
      margin: 0 auto;
    }

    .newsletter-row input {
      flex: 1;
      padding: 0.6rem 0.75rem;
      border: 1px solid #ddd;
      border-right: none;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      outline: none;
      color: #111;
    }

    .newsletter-row input::placeholder { color: #ccc; }
    .newsletter-row input:focus { border-color: #111; }

    .newsletter-row button {
      padding: 0.6rem 1rem;
      background: #111;
      color: #fff;
      border: 1px solid #111;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      cursor: pointer;
    }

    .newsletter-row button:hover { opacity: 0.75; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: #bbb;
      border-top: 1px solid #eee;
    }

    footer a { color: #bbb; text-decoration: none; }
    footer a:hover { color: #111; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .grid { grid-template-columns: repeat(2, 1fr); padding: 2rem 0; }
      .product { padding: 0 1rem; }
    }

    @media (max-width: 420px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="/"><img src="images/wordmark.png" alt="ritmoeterno"></a>
    <nav>
      <a href="/lookbook.html">lookbook</a>
      <a href="/almanac.html">almanac</a>
      <a href="https://www.instagram.com/ritmoeterno/" target="_blank" rel="noopener">instagram</a>
    </nav>
  </header>

  <main>
    <div class="grid">

      <a class="product" href="/hoodie-runrun.html">
        <div class="product-image">
          <img src="images/hoodie-flat.png" alt="Hoodie" loading="lazy">
        </div>
        <p class="product-name">hoodie</p>
      </a>

      <a class="product" href="/hoodie-legacy.html">

      <a class="product" href="/tee-goforever.html">

        </div>

      </a>

      <a class="product" href="/bandana-atacama.html">
        <div class="product-image">

      </a>

    </div>
  </main>

  <section class="newsletter">

      <input type="hidden" name="_next" value="https://ritmoeterno.com/gracias.html">

      <div class="newsletter-row">
        <input type="email" name="email" placeholder="tu email" required>
        <button type="submit">ok</button>
      </div>
    </form>
  </section>

  <footer>
    <img class="footer-symbol" src="images/logo-symbol.png" alt="">
    <a href="https://www.instagram.com/ritmoeterno/" target="_blank" rel="noopener">instagram</a>
    &nbsp;·&nbsp; © 2026 ritmoeterno
  </footer>

</body>
</html>
